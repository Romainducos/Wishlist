<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Wishlist" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <h2 class="auth-title">Wishlist</h2>
    <p class="auth-subtitle">Tes envies, organisées.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Connexion</button>
      <button class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Inscription</button>
    </div>
    <div class="field">
      <label for="auth-email">Email</label>
      <div class="input-wrap">
        <input type="email" id="auth-email" placeholder="votre@email.com" autocomplete="email" />
      </div>
    </div>
    <div class="field" style="margin-top:10px">
      <label for="auth-password">Mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>
    <button id="auth-submit" class="auth-submit-btn" onclick="submitAuth()">Se connecter</button>
    <p id="auth-msg" class="auth-msg"></p>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">Wishlist</div>

    <nav id="sidebar-nav" class="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <span id="conn-status" class="conn-status"></span>
      <p class="user-email" id="user-email"></p>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-content">
    <div class="wrap">

      <div class="page-header">
        <h1>Wishlist <span id="page-title" class="page-tab-indicator">Perso</span></h1>
      </div>

      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" class="search-input" placeholder="Rechercher…" oninput="onSearch(this.value)" />
      </div>

      <div id="lists-container"></div>

      <button id="add-list-btn" class="add-list-btn-bottom" onclick="addList()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/>
        </svg>
        Nouvelle liste
      </button>

      <div class="save-indicator" id="save-indicator">✓ Sauvegardé</div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="app.js"></script>
</body>
</html>
