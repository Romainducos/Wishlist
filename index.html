<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">🛒</div>
    <h2 class="auth-title">Wishlist</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Connexion</button>
      <button class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Inscription</button>
    </div>
    <div class="field">
      <label for="auth-email">Email</label>
      <div class="input-wrap">
        <input type="email" id="auth-email" placeholder="votre@email.com" autocomplete="email" />
      </div>
    </div>
    <div class="field" style="margin-top:10px">
      <label for="auth-password">Mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>
    <button id="auth-submit" class="auth-submit-btn" onclick="submitAuth()">Se connecter</button>
    <p id="auth-msg" class="auth-msg"></p>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <div class="wrap">

    <header>
      <div class="header-row">
        <div>
          <h1>🛒 Wishlist</h1>
          <p class="header-sub">
            Sauvegarde cloud
            <span id="conn-status" class="conn-status"></span>
          </p>
          <p class="user-email" id="user-email"></p>
        </div>
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
      </div>
    </header>

    <div id="lists-container"></div>

    <button class="add-list-btn-bottom" onclick="addList()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/>
      </svg>
      Nouvelle liste
    </button>

    <div class="save-indicator" id="save-indicator">✓ Sauvegardé</div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="app.js"></script>
</body>
</html>
